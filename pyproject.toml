[project]
name = "todoist-gtd"
version = "0.1.0"
description = "Todoist CLI with GTD coaching"
requires-python = ">=3.11"
dependencies = [
    "todoist-api-python>=3.0.0",
    "requests>=2.25.0",
]

[project.scripts]
todoist = "scripts.todoist:main"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["scripts"]
